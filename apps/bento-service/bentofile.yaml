service: "src.service:TextToVideoGenerator"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "Text-to-Video generation service"

include:
- "src/"
- "requirements.txt"
- "install_genmo.sh"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  requirements_txt: "requirements.txt"
  lock_packages: false
  extra_index_url:
    - https://download.pytorch.org/whl/cu128

docker:
  python_version: "3.11"
  base_image: "nvidia/cuda:12.8.0-runtime-ubuntu22.04"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
    - python3-dev
    - python3-pip
    - ffmpeg
    - vim
    - less
  setup_script: "./install_genmo.sh"
