service: "src.service:TextToVideoGeneratorMochi"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "High-quality Text-to-Video generation service using Genmo Mochi-1 (bfloat16 variant)"

include:
- "src/"
- "requirements.txt"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  packages:
    # Core ML dependencies with pinned versions (based on NVIDIA production setup)
    - transformers==4.46.3
    - accelerate>=0.30.0
    - bitsandbytes
    - peft
    - pillow
    - tensorboard
    # Core libraries
    - safetensors>=0.4.0
    - huggingface-hub>=0.20.0
    - numpy>=1.24.0
    - "imageio[ffmpeg]>=2.25.0"
    # Latest diffusers for Mochi-1 support
    - git+https://github.com/huggingface/diffusers.git

docker:
  base_image: "nvidia/cuda:12.8.0-devel-ubuntu22.04"
  system_packages:
    - git
    - wget
    - curl
    - vim
    - htop
    - nvtop
    - python3
    - python3-pip
    - python3-dev
    - pciutils
    - sysstat
    - ffmpeg
