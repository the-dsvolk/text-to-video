service: "src.service:TextToVideoGeneratorMochi"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "High-quality Text-to-Video generation service using Genmo Mochi-1 (bfloat16 variant)"

include:
- "src/"
- "requirements.txt"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  packages:
    - torch>=2.0.0
    - torchvision>=0.15.0
    - torchaudio>=2.0.0
    - "diffusers[torch]>=0.30.0"
    - transformers>=4.46.3
    - accelerate>=0.30.0
    - sentencepiece>=0.1.97
    - xformers>=0.0.25
    - Pillow>=10.0.0
    - safetensors>=0.4.0
    - huggingface-hub>=0.20.0
    - numpy>=1.24.0
    - "imageio[ffmpeg]>=2.25.0"
  extra_index_url: https://download.pytorch.org/whl/cu128

docker:
  python_version: "3.12"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
    - python3-dev
    - python3-pip
    - ffmpeg
    - vim
    - less
