service: "src.service:TextToVideoGenerator"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "Text-to-Video generation service using Stable Diffusion XL and Stable Video Diffusion"

include:
- "src/"
- "requirements.txt"
- "install_genmo.sh"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  packages:
    - addict>=2.4.0
    - av==13.1.0
    - click>=8.1.7
    - einops>=0.8.0
    - gradio>=3.36.1
    - moviepy==1.0.3
    - omegaconf>=2.3.0
    - pyyaml>=6.0.2
    - ray>=2.37.0
    - sentencepiece>=0.2.0
    - setuptools>=70.0.0
    - torch>=2.4.1
    - torchvision>=0.19.1
    - transformers>=4.45.2
  extra_index_url: https://download.pytorch.org/whl/cu128
  index_url: https://pypi.org/simple
  lock_packages: false

docker:
  base_image: "nvidia/cuda:12.8.0-runtime-ubuntu22.04"
  python_version: "3.11"

  setup_script: "install_genmo.sh"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
    - python3-dev
    - python3-pip
    - ffmpeg
    - vim
    - less
