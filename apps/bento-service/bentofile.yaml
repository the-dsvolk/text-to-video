service: "src.service:TextToVideoGenerator"
labels:
  owner: the-dmitry-volkov
  project: text-to-video-generation
description: "Text-to-Video generation service using Stable Diffusion XL and Stable Video Diffusion"

include:
- "src/"
- "requirements.txt"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo" 
- "*.pyd"
- ".DS_Store"

python:
  packages:
    - torch>=2.0.0
    - torchvision>=0.15.0
    - torchaudio>=2.0.0
    - diffusers>=0.30.0
    - transformers>=4.44.0
    - accelerate>=0.30.0
    - xformers>=0.0.25
    - Pillow>=10.0.0
    - safetensors>=0.4.0
    - huggingface-hub>=0.20.0
    - numpy>=1.24.0
  extra_index_url: https://download.pytorch.org/whl/cu128

docker:
  python_version: "3.12"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
  base_image: "nvidia/cuda:12.8.0-devel-ubuntu22.04"