service: "src.service:TextToVideoGenerator"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "Text-to-Video generation service using Stable Diffusion XL and Stable Video Diffusion"

include:
- "src/"
- "requirements.txt"
- "install_genmo.sh"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  requirements_txt: "requirements.txt"
  lock_packages: false

docker:
  python_version: "3.11"
  base_image: "nvcr.io/nvidia/pytorch:25.01-py3"
  setup_script: "install_genmo.sh"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
    - python3-dev
    - python3-pip
    - ffmpeg
    - vim
    - less
