service: "src.service:TextToVideoGeneratorMochi"
labels:
  owner: the-dsvolk
  project: text-to-video-generation
description: "High-quality Text-to-Video generation service using Genmo Mochi-1 (bfloat16 variant)"

include:
- "src/"
- "requirements.txt"
- "setup.sh"
- "start.sh"

exclude:
- "__pycache__/"
- ".pytest_cache/"
- "*.pyc"
- "*.pyo"
- "*.pyd"
- ".DS_Store"

python:
  packages: []
  lock_packages: false

docker:
  base_image: "pytorch/pytorch:2.8.0-cuda12.8-cudnn9-runtime"
  # python_version removed - use the Python version from base image
  # Install all packages directly to system Python (no virtual environment)
  setup_script: "setup.sh"
  env:
    BENTOML_DO_NOT_TRACK: "true"
    VIRTUAL_ENV: ""
    PYTHONPATH: "/workspace:/usr/local/lib/python3.11/site-packages"
  system_packages:
    - git
    - wget
    - curl
    - build-essential
    - python3-dev
    - python3-pip
    - ffmpeg
    - vim
    - less
