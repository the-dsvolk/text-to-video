{{- if .Values.fastapi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "text-to-video.fullname" . }}-fastapi
  namespace: {{ include "text-to-video.namespace" . }}
  labels:
    {{- include "text-to-video.fastapi.labels" . | nindent 4 }}
spec:
  {{- if not .Values.fastapi.autoscaling.enabled }}
  replicas: {{ .Values.fastapi.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "text-to-video.fastapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "text-to-video.fastapi.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "text-to-video.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "text-to-video.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: fastapi-gateway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.fastapi.image.repository }}:{{ .Values.fastapi.image.tag }}"
          imagePullPolicy: {{ .Values.fastapi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fastapi.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          env:
            {{- range $key, $value := .Values.fastapi.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          volumeMounts:
            - name: shared-videos
              mountPath: {{ .Values.fastapi.env.FASTAPI_SHARED_VOLUME_PATH }}
      volumes:
        - name: shared-videos
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}