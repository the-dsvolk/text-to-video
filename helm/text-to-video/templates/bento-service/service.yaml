{{- if .Values.bentoService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "text-to-video.fullname" . }}-bento
  namespace: {{ include "text-to-video.namespace" . }}
  labels:
    {{- include "text-to-video.bento.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "text-to-video.bento.selectorLabels" . | nindent 4 }}
{{- end }}
