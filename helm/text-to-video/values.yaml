# Default values for text-to-video chart

global:
  imageRegistry: ghcr.io
  imagePullSecrets: []

# Namespace configuration
namespace:
  create: true
  name: text-to-video-app

# FastAPI Gateway configuration
fastapi:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/the-dsvolk/fastapi-video-gateway
    tag: "mochi-2"
    pullPolicy: IfNotPresent

  service:
    type: LoadBalancer
    port: 80
    targetPort: 8000
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: text-to-video.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  env:
    SHARED_VOLUME_PATH: "/data/videos"
    BENTO_SERVICE_URL: "http://text-to-video-bento.text-to-video-app.svc.cluster.local:3000"

# BentoML service configuration (via KServe)
bentoService:
  enabled: true

  image:
    repository: ghcr.io/the-dsvolk/bento-video-service
    tag: "mochi-2"
    pullPolicy: IfNotPresent

  resources:
    limits:
      nvidia.com/gpu: 2  # 2 GPUs per service
      memory: 32Gi       # Increased memory for 2 GPUs
      cpu: 8             # Increased CPU for 2 GPUs
    requests:
      nvidia.com/gpu: 2  # 2 GPUs per service
      memory: 16Gi       # Increased memory for 2 GPUs
      cpu: 4             # Increased CPU for 2 GPUs

  replicaCount: 2  # Two BentoML services

  autoscaling:
    enabled: false  # Disable autoscaling for fixed GPU allocation
    minReplicas: 2
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  env:
    SHARED_VOLUME_PATH: "/shared/videos"
    HF_HOME: "/tmp/huggingface"
    TRANSFORMERS_CACHE: "/tmp/huggingface/transformers"
    CUDA_VISIBLE_DEVICES: "0,1"  # Use 2 GPUs per service

# Storage configuration
storage:
  enabled: true

  # Persistent Volume Claim for shared videos
  pvc:
    name: shared-videos-pvc
    accessMode: ReadWriteMany
    size: 500Gi
    storageClass: "local-raid0"  # Use our RAID0 storage class

  # Optional: Define a specific Persistent Volume
  pv:
    enabled: false
    name: shared-videos-pv
    capacity: 100Gi
    accessMode: ReadWriteMany
    hostPath: /data/shared-videos  # For local testing
    storageClass: manual

  # Model weights storage (42GB+ for Mochi models)
  modelWeights:
    enabled: true
    pvc:
      name: model-weights-pvc
      accessMode: ReadWriteOnce  # Single pod access for model loading
      size: 50Gi  # 42GB models + buffer
      storageClass: "local-raid0"  # Use our RAID0 storage class

    # Optional: Define a specific Persistent Volume for model weights
    pv:
      enabled: false
      name: model-weights-pv
      capacity: 50Gi
      accessMode: ReadWriteOnce
      hostPath: /data/model-weights  # For local testing
      storageClass: manual

# Redis removed - using file-system based job tracking

# Security configuration
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# Pod security context
podSecurityContext:
  fsGroup: 2000

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Node selector for GPU nodes
nodeSelector:
  kubernetes.io/hostname: g471  # Force scheduling on our GPU node with RAID0

# Tolerations for GPU nodes
tolerations:
  - key: node.kubernetes.io/disk-pressure
    operator: Exists
    effect: NoSchedule
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# Affinity rules
affinity: {}

# Monitoring (if Prometheus is available)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics
