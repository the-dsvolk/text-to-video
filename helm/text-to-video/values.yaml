# Default values for text-to-video chart

global:
  imageRegistry: ghcr.io
  imagePullSecrets: []

# Namespace configuration
namespace:
  create: true
  name: text-to-video-app

# FastAPI Gateway configuration
fastapi:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/the-dsvolk/fastapi-video-gateway
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: LoadBalancer
    port: 80
    targetPort: 8000
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: text-to-video.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  env:
    SHARED_VOLUME_PATH: "/data/videos"
    KSERVE_URL: "http://text-to-video-generator.text-to-video-app.svc.cluster.local/v1/models/text-to-video-generator:predict"

# BentoML service configuration (via KServe)
bentoService:
  enabled: true

  image:
    repository: ghcr.io/the-dsvolk/bento-video-service
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      nvidia.com/gpu: 2  # Minimum 2 GPUs per replica as required
      memory: 32Gi       # Increased for dual GPU setup
      cpu: 8
    requests:
      nvidia.com/gpu: 2  # Minimum 2 GPUs per replica as required
      memory: 24Gi       # Increased for Mochi-1 + dual GPU
      cpu: 4

  autoscaling:
    enabled: true
    minReplicas: 2  # Minimum 2 replicas for redundancy and fault tolerance
    maxReplicas: 5  # Increased to accommodate higher resource usage
    scaleToZero:
      enabled: false  # Disabled to ensure minimum 2 replicas always running
      timeoutSeconds: 300

  env:
    SHARED_VOLUME_PATH: "/shared/videos"
    HF_HOME: "/tmp/huggingface"
    TRANSFORMERS_CACHE: "/tmp/huggingface/transformers"
    CUDA_VISIBLE_DEVICES: "0,1"  # Enable both GPUs

# Storage configuration
storage:
  enabled: true

  # Persistent Volume Claim
  pvc:
    name: shared-videos-pvc
    accessMode: ReadWriteMany
    size: 100Gi
    storageClass: ""  # Use default storage class

  # Optional: Define a specific Persistent Volume
  pv:
    enabled: false
    name: shared-videos-pv
    capacity: 100Gi
    accessMode: ReadWriteMany
    hostPath: /data/shared-videos  # For local testing
    storageClass: manual

# Redis removed - using file-system based job tracking

# Security configuration
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# Pod security context
podSecurityContext:
  fsGroup: 2000

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Node selector for GPU nodes - require nodes with at least 2 GPUs
nodeSelector:
  # Ensure nodes have sufficient GPU resources
  accelerator: nvidia-tesla-v100  # Or appropriate GPU type
  # gpu-count: "2"  # Uncomment if cluster has this label

# Tolerations for GPU nodes
tolerations: []
  # Example: Tolerate GPU node taints
  # - key: nvidia.com/gpu
  #   operator: Exists
  #   effect: NoSchedule

# Affinity rules for high availability
affinity:
  podAntiAffinity:
    # Prefer to schedule replicas on different nodes for fault tolerance
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - text-to-video-bento
        topologyKey: kubernetes.io/hostname

# Monitoring (if Prometheus is available)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics
