name: Build BentoML Service

on:
  push:
    branches: [ '*' ]  # Trigger on any branch
    paths:
      - 'apps/bento-service/**'
      - '.github/workflows/build-bento.yml'
  pull_request:
    branches: [ main, develop, mochi-2 ]
    paths:
      - 'apps/bento-service/**'
      - '.github/workflows/build-bento.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bento-video-service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install BentoML and PyTorch
      run: |
        pip install bentoml==1.4.19
        pip install torch>=2.0.0 torchvision>=0.15.0 torchaudio>=2.0.0 --index-url https://download.pytorch.org/whl/cu128

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-,enable={{is_default_branch}}
          type=sha,prefix=pr-,enable=${{ github.event_name == 'pull_request' }}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Bento
      working-directory: ./apps/bento-service
      run: |
        bentoml build

    - name: Get Bento tag
      id: bento-tag
      working-directory: ./apps/bento-service
      run: |
        BENTO_TAG=$(bentoml list text_to_video_generator -o json | jq -r '.[0].tag')
        echo "bento_tag=$BENTO_TAG" >> $GITHUB_OUTPUT

    - name: Containerize Bento
      working-directory: ./apps/bento-service
      env:
        DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        # Create a temporary tag for building
        TEMP_TAG="temp-bento:latest"
        bentoml containerize ${{ steps.bento-tag.outputs.bento_tag }} -t $TEMP_TAG

        # Re-tag with proper registry tags from environment variable
        echo "Raw tags from env: $DOCKER_TAGS"
        printf '%s\n' "$DOCKER_TAGS" | while IFS= read -r tag; do
          if [ -n "$tag" ]; then
            echo "Tagging: $TEMP_TAG -> $tag"
            docker tag "$TEMP_TAG" "$tag"
          fi
        done

    - name: Push Docker images
      env:
        DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        echo "Raw tags from env: $DOCKER_TAGS"
        printf '%s\n' "$DOCKER_TAGS" | while IFS= read -r tag; do
          if [ -n "$tag" ]; then
            echo "Pushing: $tag"
            docker push "$tag"
          fi
        done

    - name: Image built successfully
      run: |
        echo "✅ BentoML service image built and pushed successfully!"
        echo "📦 Available at: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
